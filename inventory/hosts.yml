---
# Ansible inventory for RHOSO lab
# All playbook tasks run on the bastion; the bastion SSHs into internal hosts.
# Copy and rename this file, then set your lab_guid and credentials in
# inventory/group_vars/all/vars.yml and vault.yml.

all:
  vars:
    # Internal lab hostnames (accessed from bastion via SSH key)
    nfs_server_hostname: "nfsserver"
    standalone_hostname: "allinone"
    compute_hostname_01: "compute01"
    compute_hostname_02: "compute02"
    compute_hostname_03: "compute03"

# All OCP/RHOSO operations run on the bastion host
bastion:
  hosts:
    bastion-jumphost:
      ansible_host: "{{ bastion_hostname }}"
      ansible_user: "{{ bastion_user }}"
      ansible_port: "{{ bastion_port }}"
      ansible_ssh_pass: "{{ vault_bastion_password }}"
      ansible_python_interpreter: /usr/bin/python3.11

# NFS server — accessed through the bastion via SSH key
nfsserver:
  hosts:
    nfs-server:
      ansible_host: "{{ nfs_server_hostname }}"
      ansible_user: "cloud-user"
      ansible_ssh_private_key_file: "{{ bastion_ssh_key_path }}"
      ansible_ssh_common_args: >-
        -o ProxyCommand="sshpass -p {{ vault_bastion_password }}
        ssh -W %h:%p -p {{ bastion_port }}
        {{ bastion_user }}@{{ bastion_hostname }}"

# Compute nodes — accessed through the bastion via SSH key
compute_nodes:
  hosts:
    compute01:
      ansible_host: "{{ compute_hostname_01 }}"
      ansible_user: "cloud-user"
      ansible_ssh_private_key_file: "{{ bastion_ssh_key_path }}"
      ansible_ssh_common_args: >-
        -o ProxyCommand="sshpass -p {{ vault_bastion_password }}
        ssh -W %h:%p -p {{ bastion_port }}
        {{ bastion_user }}@{{ bastion_hostname }}"
    compute02:
      ansible_host: "{{ compute_hostname_02 }}"
      ansible_user: "cloud-user"
      ansible_ssh_private_key_file: "{{ bastion_ssh_key_path }}"
      ansible_ssh_common_args: >-
        -o ProxyCommand="sshpass -p {{ vault_bastion_password }}
        ssh -W %h:%p -p {{ bastion_port }}
        {{ bastion_user }}@{{ bastion_hostname }}"
    compute03:
      ansible_host: "{{ compute_hostname_03 }}"
      ansible_user: "cloud-user"
      ansible_ssh_private_key_file: "{{ bastion_ssh_key_path }}"
      ansible_ssh_common_args: >-
        -o ProxyCommand="sshpass -p {{ vault_bastion_password }}
        ssh -W %h:%p -p {{ bastion_port }}
        {{ bastion_user }}@{{ bastion_hostname }}"
