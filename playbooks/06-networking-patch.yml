---
# 06-networking-patch.yml — Prepare RHOCP networking for RHOSO (network isolation).
#
# Renders and applies the worker NNCPs using the lab portal Details-tab values
# (external_ip_worker_1/2/3), applies the net-attach-def and MetalLB resources,
# and enables global IP forwarding. Run after the control plane (05) and before
# the data plane (07).
- name: "Phase 06 — Networking Patch (RHOCP network isolation)"
  hosts: bastion
  gather_facts: false
  vars_files:
    - "{{ playbook_dir }}/../inventory/group_vars/all/vars.yml"
  roles:
    - role: networking-patch
