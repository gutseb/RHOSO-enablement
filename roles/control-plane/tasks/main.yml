---
# Deploys the RHOSO control plane via OpenShift GitOps (ArgoCD).
# Creates a kustomize overlay in the student's fork, commits it, then deploys
# an ArgoCD Application that pulls from their GitHub repo.

- name: Assert lab portal external IP variables are set
  ansible.builtin.assert:
    that:
      - external_ip_worker_1 is defined
      - external_ip_worker_1 != "REPLACE_WITH_PORTAL_VALUE"
      - external_ip_worker_2 is defined
      - external_ip_worker_2 != "REPLACE_WITH_PORTAL_VALUE"
      - external_ip_worker_3 is defined
      - external_ip_worker_3 != "REPLACE_WITH_PORTAL_VALUE"
    fail_msg: >-
      Fill the lab portal Details-tab values (external_ip_worker_1/2/3) in
      inventory/group_vars/all/vars.yml before running this phase — the NNCP
      patches use these as the worker external network IPs.

- name: Set manifests directory path
  ansible.builtin.set_fact:
    manifests_dir: "{{ lab_repo_local_path }}/content/files/manifests"

# ── Kustomize base overlay ─────────────────────────────────────────────────────

- name: Create environments/base directory
  ansible.builtin.file:
    path: "{{ manifests_dir }}/environments/base"
    state: directory
    mode: '0755'

- name: Render environments/base/kustomization.yaml
  ansible.builtin.template:
    src: base-kustomization.yaml.j2
    dest: "{{ manifests_dir }}/environments/base/kustomization.yaml"
    mode: '0644'

- name: Validate base kustomization can be built
  ansible.builtin.command:
    cmd: kustomize build environments/base
    chdir: "{{ manifests_dir }}"
  register: base_kustomize_build
  changed_when: false

# ── Environment overlay ────────────────────────────────────────────────────────

- name: Create environments/demo-env/controlplane directory
  ansible.builtin.file:
    path: "{{ manifests_dir }}/environments/demo-env/controlplane"
    state: directory
    mode: '0755'

- name: Render demo-env controlplane kustomization.yaml with NNCP and NetConfig patches
  ansible.builtin.template:
    src: controlplane-kustomization.yaml.j2
    dest: "{{ manifests_dir }}/environments/demo-env/controlplane/kustomization.yaml"
    mode: '0644'

- name: Validate demo-env overlay can be built
  ansible.builtin.command:
    cmd: kustomize build environments/demo-env/controlplane
    chdir: "{{ manifests_dir }}"
  register: overlay_kustomize_build
  changed_when: false

# ── ArgoCD Application directory and manifest ──────────────────────────────────

- name: Create applications/rhoso directory
  ansible.builtin.file:
    path: "{{ lab_repo_local_path }}/content/files/manifests/applications/rhoso"
    state: directory
    mode: '0755'

- name: Render ArgoCD Application manifest
  ansible.builtin.template:
    src: application-environment-demo-env-controlplane.yaml.j2
    dest: "{{ manifests_dir }}/applications/rhoso/application-environment-demo-env-controlplane.yaml"
    mode: '0644'

# ── Run artifacts (copies of everything this run rendered) ────────────────────

- name: Create artifacts directory for this phase
  ansible.builtin.file:
    path: "{{ render_artifacts_dir }}/05-control-plane"
    state: directory
    mode: '0755'

- name: Copy rendered files to artifacts
  ansible.builtin.copy:
    src: "{{ manifests_dir }}/{{ item.src }}"
    dest: "{{ render_artifacts_dir }}/05-control-plane/{{ item.name }}"
    remote_src: true
    mode: '0644'
  loop:
    - { src: "environments/base/kustomization.yaml", name: "base-kustomization.yaml" }
    - { src: "environments/demo-env/controlplane/kustomization.yaml", name: "controlplane-kustomization.yaml" }
    - { src: "applications/rhoso/application-environment-demo-env-controlplane.yaml", name: "application-environment-demo-env-controlplane.yaml" }
  loop_control:
    label: "{{ item.name }}"

# ── Commit and push to GitHub ─────────────────────────────────────────────────

- name: Stage kustomize overlay files
  ansible.builtin.command:
    cmd: git add content/files/manifests/environments content/files/manifests/applications
    chdir: "{{ lab_repo_local_path }}"
  changed_when: true

- name: Commit control plane overlay
  ansible.builtin.command:
    cmd: >
      git commit -m "Add control plane kustomize overlay and ArgoCD application for {{ lab_guid }}"
    chdir: "{{ lab_repo_local_path }}"
  register: git_commit
  changed_when: git_commit.rc == 0
  # git reports a clean tree as "nothing to commit" (no changes at all) or
  # "nothing added to commit" (only untracked files present) — both are OK
  failed_when: >-
    git_commit.rc != 0
    and 'nothing to commit' not in git_commit.stdout
    and 'nothing added to commit' not in git_commit.stdout

- name: Push overlay to GitHub
  ansible.builtin.command:
    cmd: git push origin {{ lab_branch }}
    chdir: "{{ lab_repo_local_path }}"
  register: git_push
  changed_when: git_push.rc == 0
  when: git_commit.rc == 0

# ── Deploy via ArgoCD ─────────────────────────────────────────────────────────

- name: Deploy control plane ArgoCD Application
  ansible.builtin.command: >
    oc create --save-config -f
    {{ lab_repo_local_path }}/content/files/manifests/applications/rhoso/application-environment-demo-env-controlplane.yaml
  register: argocd_app_create
  changed_when: argocd_app_create.rc == 0
  failed_when: argocd_app_create.rc != 0 and 'AlreadyExists' not in argocd_app_create.stderr

- name: Wait for ArgoCD Application to become Healthy
  ansible.builtin.command: >
    oc wait --timeout=600s -n {{ rhoso_gitops_namespace }}
    applications.argoproj.io/environment-rhoso-demo-env-controlplane
    --for jsonpath='{.status.health.status}'=Healthy
  register: argocd_health_wait
  changed_when: false

- name: Wait for OpenStack control plane to complete setup
  ansible.builtin.command: >
    oc wait --timeout={{ deployment_wait_timeout }}s
    -n {{ openstack_namespace }}
    openstackcontrolplane/openstack-control-plane
    --for condition=Ready=True
  register: cp_ready_wait
  changed_when: false

- name: Display control plane status
  ansible.builtin.command: >
    oc get openstackcontrolplane -n {{ openstack_namespace }}
  register: cp_status
  changed_when: false

- name: Show control plane status
  ansible.builtin.debug:
    var: cp_status.stdout_lines
