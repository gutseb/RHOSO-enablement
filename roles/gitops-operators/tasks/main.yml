---
# Installs NMState, MetalLB, and verifies cert-manager via oc commands on the bastion.
# cert-manager is expected to be pre-installed by the lab environment.

# ── NMState ────────────────────────────────────────────────────────────────────

- name: Create NMState operator namespace
  ansible.builtin.shell: |
    oc apply -f - <<'EOF'
    apiVersion: v1
    kind: Namespace
    metadata:
      labels:
        kubernetes.io/metadata.name: openshift-nmstate
        name: openshift-nmstate
      name: openshift-nmstate
    spec:
      finalizers:
      - kubernetes
    EOF
  register: nmstate_ns
  changed_when: "'created' in nmstate_ns.stdout or 'configured' in nmstate_ns.stdout"

- name: Create NMState OperatorGroup
  ansible.builtin.shell: |
    oc apply -f - <<'EOF'
    apiVersion: operators.coreos.com/v1
    kind: OperatorGroup
    metadata:
      annotations:
        olm.providedAPIs: NMState.v1.nmstate.io
      name: openshift-nmstate
      namespace: openshift-nmstate
    spec:
      targetNamespaces:
      - openshift-nmstate
    EOF
  register: nmstate_og
  changed_when: "'created' in nmstate_og.stdout or 'configured' in nmstate_og.stdout"

- name: Create NMState Subscription
  ansible.builtin.shell: |
    oc apply -f - <<'EOF'
    apiVersion: operators.coreos.com/v1alpha1
    kind: Subscription
    metadata:
      labels:
        operators.coreos.com/kubernetes-nmstate-operator.openshift-nmstate: ""
      name: kubernetes-nmstate-operator
      namespace: openshift-nmstate
    spec:
      channel: stable
      installPlanApproval: Automatic
      name: kubernetes-nmstate-operator
      source: redhat-operators
      sourceNamespace: openshift-marketplace
    EOF
  register: nmstate_sub
  changed_when: "'created' in nmstate_sub.stdout or 'configured' in nmstate_sub.stdout"

- name: Wait for NMState CSV to succeed
  ansible.builtin.shell: >
    oc get clusterserviceversion -n openshift-nmstate --no-headers | grep Succeeded
  register: nmstate_csv
  until: nmstate_csv.rc == 0
  retries: 60
  delay: 10
  changed_when: false

- name: Wait for NMState CRD to be available
  ansible.builtin.shell: oc get crd nmstates.nmstate.io
  register: nmstate_crd
  until: nmstate_crd.rc == 0
  retries: 30
  delay: 10
  changed_when: false

- name: Create NMState instance
  ansible.builtin.shell: |
    oc apply -f - <<'EOF'
    apiVersion: nmstate.io/v1
    kind: NMState
    metadata:
      name: nmstate
    EOF
  register: nmstate_instance
  until: nmstate_instance.rc == 0
  retries: 5
  delay: 10
  changed_when: "'created' in nmstate_instance.stdout or 'configured' in nmstate_instance.stdout"

- name: Verify NMState pods are running
  ansible.builtin.shell: >
    oc get pods -n openshift-nmstate --no-headers | grep -v Completed | grep -c Running
  register: nmstate_pods
  until: nmstate_pods.stdout | int >= 3
  retries: 30
  delay: 10
  changed_when: false

# ── MetalLB ────────────────────────────────────────────────────────────────────

- name: Create MetalLB operator namespace
  ansible.builtin.shell: |
    oc apply -f - <<'EOF'
    apiVersion: v1
    kind: Namespace
    metadata:
      name: metallb-system
    EOF
  register: metallb_ns
  changed_when: "'created' in metallb_ns.stdout or 'configured' in metallb_ns.stdout"

- name: Create MetalLB OperatorGroup
  ansible.builtin.shell: |
    oc apply -f - <<'EOF'
    apiVersion: operators.coreos.com/v1
    kind: OperatorGroup
    metadata:
      name: metallb-operator
      namespace: metallb-system
    EOF
  register: metallb_og
  changed_when: "'created' in metallb_og.stdout or 'configured' in metallb_og.stdout"

- name: Create MetalLB Subscription
  ansible.builtin.shell: |
    oc apply -f - <<'EOF'
    apiVersion: operators.coreos.com/v1alpha1
    kind: Subscription
    metadata:
      name: metallb-operator-sub
      namespace: metallb-system
    spec:
      channel: stable
      name: metallb-operator
      source: redhat-operators
      sourceNamespace: openshift-marketplace
    EOF
  register: metallb_sub
  changed_when: "'created' in metallb_sub.stdout or 'configured' in metallb_sub.stdout"

- name: Wait for MetalLB CSV to succeed
  ansible.builtin.shell: >
    oc get clusterserviceversion -n metallb-system --no-headers | grep Succeeded
  register: metallb_csv
  until: metallb_csv.rc == 0
  retries: 60
  delay: 10
  changed_when: false

- name: Wait for MetalLB CRD to be available
  ansible.builtin.shell: oc get crd metallbs.metallb.io
  register: metallb_crd
  until: metallb_crd.rc == 0
  retries: 30
  delay: 10
  changed_when: false

- name: Wait for MetalLB webhook endpoints to be ready
  ansible.builtin.shell: >
    oc get endpoints metallb-operator-controller-manager-service -n metallb-system
    -o jsonpath='{.subsets[*].addresses[*].ip}' 2>/dev/null | grep -q '[0-9]'
  register: metallb_webhook
  until: metallb_webhook.rc == 0
  retries: 30
  delay: 5
  changed_when: false

- name: Create MetalLB instance
  ansible.builtin.shell: |
    oc apply -f - <<'EOF'
    apiVersion: metallb.io/v1beta1
    kind: MetalLB
    metadata:
      name: metallb
      namespace: metallb-system
    spec:
      nodeSelector:
        node-role.kubernetes.io/worker: ""
    EOF
  register: metallb_instance
  until: metallb_instance.rc == 0
  retries: 5
  delay: 10
  changed_when: "'created' in metallb_instance.stdout or 'configured' in metallb_instance.stdout"

- name: Wait for MetalLB controller to be ready
  ansible.builtin.shell: >
    oc get deployment -n metallb-system controller -o jsonpath='{.status.readyReplicas}'
  register: metallb_controller
  until: metallb_controller.stdout | int >= 1
  retries: 30
  delay: 10
  changed_when: false

- name: Wait for MetalLB speakers to be ready
  ansible.builtin.shell: >
    oc get daemonset -n metallb-system speaker -o jsonpath='{.status.numberReady}'
  register: metallb_speaker
  until: metallb_speaker.stdout | int > 0
  retries: 30
  delay: 10
  changed_when: false

# ── cert-manager (pre-installed, just verify) ──────────────────────────────────

- name: Verify cert-manager pods are running
  ansible.builtin.shell: >
    oc get pods -n cert-manager --no-headers | grep -c Running
  register: cert_manager_pods
  until: cert_manager_pods.stdout | int >= 3
  retries: 30
  delay: 10
  changed_when: false

- name: Display operator status summary
  ansible.builtin.debug:
    msg:
      - "NMState pods running    : {{ nmstate_pods.stdout }}"
      - "MetalLB controller ready: {{ metallb_controller.stdout }}"
      - "MetalLB speakers ready  : {{ metallb_speaker.stdout }}"
      - "cert-manager pods running: {{ cert_manager_pods.stdout }}"
